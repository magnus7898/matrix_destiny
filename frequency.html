<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>სიხშირეების გენერატორი</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 520px;
    margin: auto;
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* Buttons */
button {
    margin: 6px;
    padding: 10px 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    color: black;
}

button:hover {
    transform: scale(1.1);
}

/* Chakra Colors */
.red { background: #ff4d4d; }
.orange { background: #ff944d; }
.yellow { background: #ffe066; }
.green { background: #66ff99; }
.lightblue { background: #66ccff; }
.blue { background: #4d79ff; color:white; }
.purple { background: #cc66ff; color:white; }
.neutral { background: #cccccc; }

/* Active Playing Effect */
.active {
    box-shadow: 0 0 20px white;
    transform: scale(1.15);
}

/* Controls */
input, select {
    margin: 10px;
    padding: 8px;
    border-radius: 8px;
    border: none;
    width: 80%;
}

.controls {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎵 ხმოვანი სიხშირეები</h1>

<div class="container">

<h3>ჩაკრების სიხშირეები</h3>

<div id="buttons">
    <button class="red" onclick="setFreq(396, this)">396</button>
    <button class="orange" onclick="setFreq(417, this)">417</button>
    <button class="yellow" onclick="setFreq(528, this)">528</button>
    <button class="green" onclick="setFreq(639, this)">639</button>
    <button class="lightblue" onclick="setFreq(741, this)">741</button>
    <button class="blue" onclick="setFreq(852, this)">852</button>
    <button class="purple" onclick="setFreq(963, this)">963</button>
    <button class="neutral" onclick="setFreq(174, this)">174</button>
    <button class="neutral" onclick="setFreq(285, this)">285</button>
    <button class="neutral" onclick="setFreq(432, this)">432</button>
</div>

<div class="controls">
    <h3>შეიყვანე სიხშირე</h3>

    <label>სიხშირე (Hz)</label><br>
    <input type="number" id="freqInput" value="432"><br>

    <label>ტალღა</label><br>
    <select id="waveType">
        <option value="sine">Sine</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
        <option value="sawtooth">Sawtooth</option>
    </select><br>

    <label>ხმის დონე</label><br>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2"><br>

    <button onclick="startTone()">▶ დაწყება</button>
    <button onclick="stopTone()">⏹ გაჩერება</button>
</div>

</div>

<script>
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let currentButton = null;

function setFreq(freq, btn) {
    document.getElementById("freqInput").value = freq;

    if (oscillator) {
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    }

    // Highlight active button
    document.querySelectorAll("#buttons button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentButton = btn;
}

function startTone() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
    }

    updateSound();
}

function updateSound() {
    if (!oscillator) return;

    const freq = parseFloat(document.getElementById("freqInput").value);
    const wave = document.getElementById("waveType").value;
    const volume = parseFloat(document.getElementById("volume").value);

    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    oscillator.type = wave;
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
}

function stopTone() {
    if (!audioCtx) return;

    oscillator.stop();
    audioCtx.close();

    oscillator = null;
    audioCtx = null;

    // remove active glow
    document.querySelectorAll("#buttons button").forEach(b => b.classList.remove("active"));
}

/* REAL-TIME CONTROL FIX */
document.getElementById("volume").addEventListener("input", updateSound);
document.getElementById("freqInput").addEventListener("input", updateSound);
document.getElementById("waveType").addEventListener("change", updateSound);

</script>

</body>
</html>
