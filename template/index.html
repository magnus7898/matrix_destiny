
<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>არჩევა</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #020617;
  overflow-x: hidden; /* ✅ allow vertical scroll */
}

/* 🌌 Nebula layer */
.nebula {
  position: fixed;
  top: -20%;
  left: -20%;
  width: 140%;
  height: 140%;
  z-index: 0;
  filter: blur(80px);
  opacity: 0.6;
  animation: moveNebula 30s infinite alternate ease-in-out;
  background:
    radial-gradient(circle at 30% 40%, rgba(99,102,241,0.4), transparent),
    radial-gradient(circle at 70% 60%, rgba(236,72,153,0.4), transparent),
    radial-gradient(circle at 50% 80%, rgba(34,197,94,0.3), transparent);
}

@keyframes moveNebula {
  0% { transform: translate(0,0) scale(1); }
  100% { transform: translate(-5%, -5%) scale(1.1); }
}

/* 🌠 Stars */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Content wrapper */
.wrapper {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

/* Grid */
.container {
  display: grid;
  gap: 25px;
  width: 100%;
  max-width: 900px;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

/* 🧊 Glass cards */
.box {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  font-size: 20px;
  color: white;
  border-radius: 20px;
  cursor: pointer;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.15);

  transition: 0.3s;
}

/* Glow accents */
.matrix { box-shadow: 0 10px 30px rgba(124,58,237,0.4); }
.pythagoras { box-shadow: 0 10px 30px rgba(245,158,11,0.4); }
.name { box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
.astro { box-shadow: 0 10px 30px rgba(236,72,153,0.4); }
.frequency { box-shadow: 0 10px 30px rgba(34,197,94,0.4); }

@media (hover:hover) {
  .box:hover {
    transform: translateY(-10px) scale(1.03);
    background: rgba(255,255,255,0.15);
  }
}

.box:active {
  transform: scale(0.96);
}

/* Mobile */
@media (max-width: 480px) {
  .wrapper {
    align-items: flex-start; /* ✅ allow scroll naturally */
    padding-top: 60px;
  }

  .box {
    height: 120px;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="nebula"></div>
<canvas id="stars"></canvas>

<div class="wrapper">
  <div class="container">
    <div class="box matrix" onclick="openMatrix()">ბედისწერის მატრიცა</div>
    <div class="box pythagoras" onclick="openPythagoras()">პითაგორას კვადრატი</div>
    <div class="box name" onclick="openName()">სახელის ნუმეროლოგია</div>
    <div class="box astro" onclick="openAstro()">ასტროლოგია</div>
    <div class="box frequency" onclick="openFrequency()">სიხშირეები</div>
  </div>
</div>

<script>
// Navigation
function openMatrix(){ location.href="matrix.html"; }
function openPythagoras(){ location.href="pythagoras.html"; }
function openName(){ location.href="name.html"; }
function openAstro(){ location.href="/astro"; }
function openFrequency(){ location.href="frequency.html"; }

// 🌠 Stars
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let stars = [];
const STAR_COUNT = 120;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5,
    s: Math.random() * 0.3,
    a: Math.random()
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(star => {
    star.y += star.s;
    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }

    star.a += (Math.random() - 0.5) * 0.05;

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${star.a})`;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
