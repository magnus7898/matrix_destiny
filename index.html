<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>არჩევა</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  font-family: sans-serif;
  padding: 20px;
}

/* Container */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 900px;
}

/* Cards */
.box {
  width: 100%;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  border-radius: 18px;
  cursor: pointer;
  text-align: center;
  padding: 15px;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Hover only on desktop */
@media (hover: hover) {
  .box:hover {
    transform: scale(1.05);
  }
}

/* Active tap effect for mobile */
.box:active {
  transform: scale(0.97);
}

/* Colors */
.matrix {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
}

.pythagoras {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
}

.name {
  background: linear-gradient(135deg, #10b981, #06b6d4);
}

.astro {
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
}

.frequency {
  background: linear-gradient(135deg, #22c55e, #84cc16);
}

/* 📱 Small phones */
@media (max-width: 480px) {
  .box {
    height: 120px;
    font-size: 16px;
    border-radius: 15px;
  }
}

/* 📲 Tablets */
@media (min-width: 768px) {
  .box {
    height: 160px;
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">
  
  <div class="box matrix" onclick="openMatrix()">
    ბედისწერის მატრიცა
  </div>

  <div class="box pythagoras" onclick="openPythagoras()">
    პითაგორას კვადრატი
  </div>

  <div class="box name" onclick="openName()">
    სახელის ნუმეროლოგია
  </div>

  <div class="box astro" onclick="openAstro()">
    ასტროლოგია
  </div>

  <div class="box frequency" onclick="openFrequency()">
    სიხშირეები
  </div>

</div>

<script>
function openMatrix() {
  window.location.href = "matrix.html";
}

function openPythagoras() {
  window.location.href = "pythagoras.html";
}

function openName() {
  window.location.href = "name.html";
}

function openAstro() {
  window.location.href = "astro.html";
}

function openFrequency() {
  window.location.href = "frequency.html";
}
</script>

</body>
</html>
