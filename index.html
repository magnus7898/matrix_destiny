<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>არჩევა</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .box {
      width: 260px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      text-align: center;
      padding: 20px;
      transition: 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .box:hover {
      transform: scale(1.05);
    }

    .matrix {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
    }

    .pythagoras {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Button 1 -->
  <div class="box matrix" onclick="openMatrix()">
    ბედისწერის მატრიცა
  </div>

  <!-- Button 2 -->
  <div class="box pythagoras" onclick="openPythagoras()">
    პითაგორას კვადრატი
  </div>

</div>

<script>
  function openMatrix() {
    window.location.href = "matrix.html";
  }

  function openPythagoras() {
    // change this later when you create second page
    alert("პითაგორას კვადრატი ჯერ არ არის დამატებული");
  }
</script>

</body>
</html>
