<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>არჩევა</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  font-family: sans-serif;
  padding: 20px;
}

/* Container */
.container {
  display: grid;
  gap: 25px;
  width: 100%;
  max-width: 900px;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

/* Desktop tuning */
@media (min-width: 900px) {
  .container {
    grid-template-columns: repeat(3, 1fr);
    max-width: 900px;
  }
}

/* Cards */
.box {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  text-align: center;
  padding: 20px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Desktop hover */
@media (hover: hover) {
  .box:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }
}

/* Mobile tap */
.box:active {
  transform: scale(0.96);
}

/* Colors */
.matrix {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
}

.pythagoras {
  background: linear-gradient(135deg, #f59e0b, #ef4444);
}

.name {
  background: linear-gradient(135deg, #10b981, #06b6d4);
}

.astro {
  background: linear-gradient(135deg, #ec4899, #8b5cf6);
}

.frequency {
  background: linear-gradient(135deg, #22c55e, #84cc16);
}

/* Small mobile */
@media (max-width: 480px) {
  .box {
    height: 120px;
    font-size: 16px;
    border-radius: 16px;
  }
}
</style>
</head>

<body>

<div class="container">
  
  <div class="box matrix" onclick="openMatrix()">
    ბედისწერის მატრიცა
  </div>

  <div class="box pythagoras" onclick="openPythagoras()">
    პითაგორას კვადრატი
  </div>

  <div class="box name" onclick="openName()">
    სახელის ნუმეროლოგია
  </div>

  <div class="box astro" onclick="openAstro()">
    ასტროლოგია
  </div>

  <div class="box frequency" onclick="openFrequency()">
    სიხშირეები
  </div>

</div>

<script>
function openMatrix() {
  window.location.href = "matrix.html";
}

function openPythagoras() {
  window.location.href = "pythagoras.html";
}

function openName() {
  window.location.href = "name.html";
}

function openAstro() {
  window.location.href = "astro.html";
}

function openFrequency() {
  window.location.href = "frequency.html";
}
</script>

</body>
</html>
