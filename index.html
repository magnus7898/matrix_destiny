<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>არჩევა</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* 🌌 Enhanced background */
  background: radial-gradient(circle at 20% 30%, #1e293b, transparent),
              radial-gradient(circle at 80% 70%, #0f172a, transparent),
              linear-gradient(135deg, #020617, #0f172a);

  font-family: sans-serif;
  padding: 20px;
}

/* Container */
.container {
  display: grid;
  gap: 25px;
  width: 100%;
  max-width: 900px;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
}

@media (min-width: 900px) {
  .container {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* 🧊 Glass cards */
.box {
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;

  font-size: 20px;
  color: white;

  border-radius: 20px;
  cursor: pointer;

  /* Glass effect */
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.15);

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);

  transition: all 0.3s ease;
}

/* ✨ subtle colored glow accents */
.matrix { box-shadow: 0 10px 30px rgba(124,58,237,0.4); }
.pythagoras { box-shadow: 0 10px 30px rgba(245,158,11,0.4); }
.name { box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
.astro { box-shadow: 0 10px 30px rgba(236,72,153,0.4); }
.frequency { box-shadow: 0 10px 30px rgba(34,197,94,0.4); }

/* Hover (desktop) */
@media (hover: hover) {
  .box:hover {
    transform: translateY(-10px) scale(1.03);
    background: rgba(255,255,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  }
}

/* Tap (mobile) */
.box:active {
  transform: scale(0.96);
}

/* Small screens */
@media (max-width: 480px) {
  .box {
    height: 120px;
    font-size: 16px;
    border-radius: 16px;
  }
}
</style>
</head>

<body>

<div class="container">
  
  <div class="box matrix" onclick="openMatrix()">
    ბედისწერის მატრიცა
  </div>

  <div class="box pythagoras" onclick="openPythagoras()">
    პითაგორას კვადრატი
  </div>

  <div class="box name" onclick="openName()">
    სახელის ნუმეროლოგია
  </div>

  <div class="box astro" onclick="openAstro()">
    ასტროლოგია
  </div>

  <div class="box frequency" onclick="openFrequency()">
    სიხშირეები
  </div>

</div>

<script>
function openMatrix() {
  window.location.href = "matrix.html";
}

function openPythagoras() {
  window.location.href = "pythagoras.html";
}

function openName() {
  window.location.href = "name.html";
}

function openAstro() {
  window.location.href = "astro.html";
}

function openFrequency() {
  window.location.href = "frequency.html";
}
</script>

</body>
</html>
