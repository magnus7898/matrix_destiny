
<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>ნატალური რუქა</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #07071a; color: #e0d8ff;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 24px 16px;
}
h1 { color: #a78bfa; margin-bottom: 20px; font-size: 22px; letter-spacing: 2px; }
.form-wrap {
  background: #0f0d2a; border: 1px solid #2d1f6e;
  border-radius: 12px; padding: 20px;
  width: 100%; max-width: 600px; margin-bottom: 24px;
}
.row { display: flex; gap: 10px; margin-bottom: 12px; }
.field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
label { font-size: 11px; color: #9f8fd4; text-transform: uppercase; letter-spacing: 1px; }
input {
  background: #1a1545; border: 1px solid #3d2a8a;
  border-radius: 6px; color: #e0d8ff;
  padding: 7px 10px; font-size: 13px; width: 100%;
}
input:focus { outline: none; border-color: #7c3aed; }
#city-hint { font-size: 11px; color: #7c6aad; margin-top: 4px; min-height: 16px; }
.coords input { background: #120f35; color: #7c6aad; }
#tz-display {
  font-size: 11px; color: #a78bfa; margin-top: 4px;
  background: #120f35; border-radius: 4px; padding: 4px 8px; min-height: 20px;
}
button {
  width: 100%; background: #6d28d9; color: #fff;
  border: none; border-radius: 8px; padding: 11px;
  font-size: 15px; cursor: pointer; margin-top: 4px; letter-spacing: 1px;
}
button:hover { background: #7c3aed; }
#chart-area { width: 100%; max-width: 760px; }
svg#wheel { width: 100%; height: auto; display: block; }
.tables-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
@media(max-width:600px){ .tables-wrap { grid-template-columns: 1fr; } }
.table-section h3 {
  color: #a78bfa; font-size: 13px; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid #2d1f6e; letter-spacing: 1px;
}
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th {
  color: #9f8fd4; border-bottom: 1px solid #2d1f6e; padding: 5px 8px;
  text-align: left; font-weight: normal; font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.8px;
}
td { padding: 4px 8px; border-bottom: 1px solid #0f0d28; }
tr:hover td { background: #13103a; }
.retro { color: #f87171; font-size: 10px; }
.asp-sym { font-size: 16px; font-family: serif; }
.house-badge {
  display: inline-block; background: #1a1545;
  border: 1px solid #3d2a8a; border-radius: 4px;
  padding: 1px 5px; font-size: 10px; color: #a78bfa;
}
</style>
</head>
<body>
<h1>✦ ნატალური რუქა ✦</h1>

<div class="form-wrap">
  <div class="row">
    <div class="field"><label>სახელი</label><input id="name" placeholder="სახელი"></div>
  </div>
  <div class="row">
    <div class="field"><label>დღე</label><input type="number" id="day" value="1" min="1" max="31"></div>
    <div class="field"><label>თვე</label><input type="number" id="month" value="1" min="1" max="12"></div>
    <div class="field"><label>წელი</label><input type="number" id="year" value="1990"></div>
  </div>
  <div class="row">
    <div class="field"><label>საათი</label><input type="number" id="hour" value="12" min="0" max="23"></div>
    <div class="field"><label>წუთი</label><input type="number" id="minute" value="0" min="0" max="59"></div>
    <div class="field"><label>წამი</label><input type="number" id="second" value="0" min="0" max="59"></div>
  </div>
  <div class="field" style="margin-bottom:8px">
    <label>ქალაქი</label>
    <input id="city" placeholder="მაგ. თბილისი" oninput="searchCity()">
    <div id="city-hint"></div>
  </div>
  <div class="coords row">
    <div class="field"><label>განედი (Lat)</label><input type="number" id="lat" step="0.0001" readonly></div>
    <div class="field"><label>გრძედი (Lon)</label><input type="number" id="lon" step="0.0001" readonly></div>
  </div>
  <div id="tz-display">⏳ ქალაქის შეყვანის შემდეგ სარტყელი განისაზღვრება</div>
  <input type="hidden" id="tz_name" value="UTC">
  <button onclick="generateChart()">✦ რუქის გენერაცია</button>
</div>

<div id="chart-area" style="display:none">
  <svg id="wheel" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="tables-wrap">
    <div class="table-section">
      <h3>🪐 პლანეტები</h3>
      <table>
        <thead><tr>
          <th>სიმბ.</th><th>პლანეტა</th><th>გრად.</th><th>ნიშანი</th><th>სახ.</th><th>მდგ.</th>
        </tr></thead>
        <tbody id="planet-tbody"></tbody>
      </table>
    </div>
    <div class="table-section">
      <h3>🏠 სახლები (Placidus)</h3>
      <table>
        <thead><tr><th>სახლი</th><th>ნიშანი</th><th>გრადუსი</th></tr></thead>
        <tbody id="house-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="table-section" style="margin-top:16px">
    <h3>⚡ ასპექტები</h3>
    <table>
      <thead><tr>
        <th>პლანეტა 1</th><th>ასპ.</th><th>პლანეტა 2</th><th>ტიპი</th><th>ორბი</th>
      </tr></thead>
      <tbody id="aspect-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const CX=350, CY=350;
const R1=270;  // outer circle — degree ticks on inside
const R2=202;  // zodiac inner / house outer
const R3=135;  // house inner
const R4=105;  // innermost

const SIGN_KA=['ვერძი','კურო','ტყუპები','კირჩხიბი','ლომი','ქალწული',
               'სასწორი','მორიელი','მშვილდოსანი','თხის რქა','მერწყული','თევზები'];
const ZSYM=['♈︎','♉︎','♊︎','♋︎','♌︎','♍︎','♎︎','♏︎','♐︎','♑︎','♒︎','♓︎'];
const ZCOL=['#e05252','#c87c2e','#c8b428','#3a9e6e','#d4821e','#7ab43c',
            '#5ab8c8','#8050c8','#c84040','#7888c8','#50a8e8','#8070d8'];

const PI={
  'მზე':          {sym:'☉',  color:'#f9c646'},
  'მთვარე':       {sym:'☽',  color:'#c8d8f0'},
  'მერკური':      {sym:'☿',  color:'#a0c8d0'},
  'ვენერა':       {sym:'♀',  color:'#e87878'},
  'მარსი':        {sym:'♂',  color:'#e84040'},
  'იუპიტერი':     {sym:'♃',  color:'#e89040'},
  'სატურნი':      {sym:'♄',  color:'#c8c840'},
  'ურანი':        {sym:'♅',  color:'#50c8d8'},
  'ნეპტუნი':      {sym:'♆',  color:'#6070d8'},
  'პლუტონი':      {sym:'⯓',  color:'#c050a0'},
  'ქირონი':       {sym:'⚷',  color:'#d08040'},
  'ლილიტი':       {sym:'⚸',  color:'#904060'},
  'ჩრდ. კვანძი':  {sym:'☊',  color:'#60c060'},
  'სამხ. კვანძი': {sym:'☋',  color:'#c06060'},
  'ვერტექსი':     {sym:'Vx', color:'#8090d0'},
  'თეთრი მთვარე': {sym:'⯝',  color:'#d0e8f8'},
  'ბედის ვარსკვლავი': {sym:'⊕',  color:'#f0c060'},
};

const PORDER=[
  'მზე','მთვარე','მერკური','ვენერა','მარსი',
  'იუპიტერი','სატურნი','ურანი','ნეპტუნი','პლუტონი',
  'ქირონი','ლილიტი','ჩრდ. კვანძი','სამხ. კვანძი',
  'ვერტექსი','თეთრი მთვარე','ბედის ვარსკვლავი'
];

let cityTimer=null;
function searchCity(){
  clearTimeout(cityTimer);
  cityTimer=setTimeout(async()=>{
    const city=document.getElementById('city').value;
    if(city.length<2) return;
    try {
      const r=await fetch('/geocode',{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({city})});
      if(r.ok){
        const d=await r.json();
        if(d.error){ document.getElementById('city-hint').textContent='❌ '+d.error; return; }
        document.getElementById('lat').value=d.lat.toFixed(4);
        document.getElementById('lon').value=d.lon.toFixed(4);
        document.getElementById('city-hint').textContent='📍 '+d.display;
        document.getElementById('tz_name').value=d.tz_name||'UTC';
        document.getElementById('tz-display').textContent='🕐 '+d.tz_name+' (ისტორიულად ზუსტი)';
      } else {
        document.getElementById('city-hint').textContent='❌ ქალაქი ვერ მოიძებნა';
      }
    } catch(e) {
      document.getElementById('city-hint').textContent='❌ შეცდომა: '+e.message;
    }
  },600);
}

async function generateChart(){
  const lat=document.getElementById('lat').value;
  const lon=document.getElementById('lon').value;
  if(!lat||!lon){alert('პირველ შეიყვანეთ ქალაქი');return;}
  const payload={
    year:+document.getElementById('year').value,
    month:+document.getElementById('month').value,
    day:+document.getElementById('day').value,
    hour:+document.getElementById('hour').value,
    minute:+document.getElementById('minute').value,
    second:+document.getElementById('second').value,
    lat:+lat, lon:+lon,
    tz_name:document.getElementById('tz_name').value
  };
  const r=await fetch('/chart',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const data=await r.json();
  document.getElementById('chart-area').style.display='block';
  drawWheel(data);
  drawPlanetTable(data);
  drawHouseTable(data);
  drawAspectTable(data);
}

const NS='http://www.w3.org/2000/svg';
function el(tag,attrs,parent){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}
function txt(parent,s,x,y,attrs){
  const t=el('text',{'text-anchor':'middle','dominant-baseline':'central',x,y,...attrs},parent);
  t.textContent=s; return t;
}
function toRad(d){return d*Math.PI/180;}
function e2s(ecl,asc){return toRad(-(ecl-asc))+Math.PI;}
function pxy(a,r){return{x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r};}

function drawWheel(data){
  const svg=document.getElementById('wheel');
  svg.innerHTML='';
  const asc=data.asc;

  // Arrow marker for MC connection line
  const defs=el('defs',{},svg);
  const marker=el('marker',{id:'arr',viewBox:'0 0 10 10',refX:'8',refY:'5',
    markerWidth:'5',markerHeight:'5',orient:'auto-start-reverse'},defs);
  el('path',{d:'M2 1L8 5L2 9',fill:'none',stroke:'#c084fc',
    'stroke-width':'1.5','stroke-linecap':'round','stroke-linejoin':'round'},marker);

  el('rect',{width:700,height:700,fill:'#07071a'},svg);

  // Zodiac band R1→R2
  for(let i=0;i<12;i++){
    const p=(d,r)=>{const a=e2s(d,asc);return`${CX+Math.cos(a)*r},${CY+Math.sin(a)*r}`;};
    el('path',{
      d:`M${p(i*30,R1)} A${R1},${R1} 0 0,0 ${p((i+1)*30,R1)} L${p((i+1)*30,R2)} A${R2},${R2} 0 0,1 ${p(i*30,R2)} Z`,
      fill:i%2?'#0a0820':'#0f0c28'
    },svg);
  }

  // House band R2→R3
  for(let i=0;i<12;i++){
    const h1=data.houses[i],h2=data.houses[(i+1)%12];
    const span=((h2-h1)+360)%360,la=span>180?1:0;
    const p=(d,r)=>{const a=e2s(d,asc);return`${CX+Math.cos(a)*r},${CY+Math.sin(a)*r}`;};
    el('path',{
      d:`M${p(h1,R2)} A${R2},${R2} 0 ${la},0 ${p(h2,R2)} L${p(h2,R3)} A${R3},${R3} 0 ${la},1 ${p(h1,R3)} Z`,
      fill:i%2?'#080715':'#0d0b1e'
    },svg);
  }

  // Degree ticks
  for(let deg=0;deg<360;deg++){
    const a=e2s(deg,asc),c=Math.cos(a),s=Math.sin(a);
    const is30=deg%30===0,is10=deg%10===0,is5=deg%5===0;
    const len=is30?22:is10?14:is5?9:4;
    el('line',{
      x1:CX+c*R1,y1:CY+s*R1,x2:CX+c*(R1-len),y2:CY+s*(R1-len),
      stroke:is30?'#d0b0ff':is10?'#9060d0':is5?'#6040a0':'#3d2060',
      'stroke-width':is30?1.8:is10?1.2:is5?0.8:0.4
    },svg);
  }

  // Degree numbers every 10°
  for(let deg=0;deg<360;deg+=10){
    if(deg%30===0) continue;
    const a=e2s(deg,asc);
    const nr=R1-34,nx=CX+Math.cos(a)*nr,ny=CY+Math.sin(a)*nr;
    const rot=(a*180/Math.PI)+90;
    txt(svg,String(deg%30),nx,ny,{
      fill:'#7050b0','font-size':7,'font-family':'sans-serif',
      transform:`rotate(${rot},${nx},${ny})`
    });
  }

  // Zodiac dividers R1→R2
  for(let i=0;i<12;i++){
    const a=e2s(i*30,asc);
    el('line',{
      x1:CX+Math.cos(a)*R1,y1:CY+Math.sin(a)*R1,
      x2:CX+Math.cos(a)*R2,y2:CY+Math.sin(a)*R2,
      stroke:'#9070e0','stroke-width':1
    },svg);
  }

  // Circles
  el('circle',{cx:CX,cy:CY,r:R1,fill:'none',stroke:'#8060d0','stroke-width':2},svg);
  el('circle',{cx:CX,cy:CY,r:R2,fill:'none',stroke:'#5a3fa8','stroke-width':1.2},svg);
  el('circle',{cx:CX,cy:CY,r:R3,fill:'none',stroke:'#3a2878','stroke-width':1},svg);
  el('circle',{cx:CX,cy:CY,r:R4,fill:'#07071a',stroke:'#2d1f6e','stroke-width':1},svg);

  // Zodiac symbols
  const Rzs=(R1+R2)/2;
  for(let i=0;i<12;i++){
    const a=e2s(i*30+15,asc);
    txt(svg,ZSYM[i],CX+Math.cos(a)*Rzs,CY+Math.sin(a)*Rzs,
      {fill:ZCOL[i],'font-size':22,'font-family':'serif','font-weight':'bold'});
  }

  // House lines + numbers
  const Rhn=(R2+R3)/2;
  for(let i=0;i<12;i++){
    const a=e2s(data.houses[i],asc);
    const isAngle=[0,3,6,9].includes(i);
    el('line',{
      x1:CX+Math.cos(a)*R2,y1:CY+Math.sin(a)*R2,
      x2:CX+Math.cos(a)*R3,y2:CY+Math.sin(a)*R3,
      stroke:isAngle?'#c084fc':'#5030a0','stroke-width':isAngle?2:0.8
    },svg);
    const next=data.houses[(i+1)%12];
    let mid=data.houses[i]+((next-data.houses[i]+360)%360)/2;
    if(mid>=360) mid-=360;
    const ma=e2s(mid,asc);
    txt(svg,String(i+1),CX+Math.cos(ma)*Rhn,CY+Math.sin(ma)*Rhn,
      {fill:'#8070c0','font-size':11,'font-family':'serif','font-weight':'bold'});
  }

  // Aspect lines inside R4
  if(data.aspects){
    for(const asp of data.aspects){
      if(!data.planets[asp.p1]||!data.planets[asp.p2]) continue;
      const a1=e2s(data.planets[asp.p1].degree,asc);
      const a2=e2s(data.planets[asp.p2].degree,asc);
      const p1=pxy(a1,R4-2),p2=pxy(a2,R4-2);
      el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
        stroke:asp.color,'stroke-width':0.8,opacity:0.55},svg);
    }
  }

  // ── Planets outside R1 ─────────────────────────────────────────────────
  const present = Object.keys(data.planets);

  // True SVG angles
  const trueA = {};
  for(const n of present) trueA[n] = e2s(data.planets[n].degree, asc);

  // Sort by true angle for stable spreading
  const sorted = [...present].sort((a,b) => trueA[a] - trueA[b]);

  // Display angles start at true angles
  const dispA = {};
  for(const n of present) dispA[n] = trueA[n];

  const Rg      = R1 + 28;     // glyph ring radius
  const SYMHALF = 11;           // half-size of symbol in px at Rg
  const MINGAP  = (SYMHALF * 2 + 3) / Rg; // min angle gap so symbols don't touch

  // Push overlapping pairs apart — 500 iterations, early exit
  for(let it = 0; it < 500; it++){
    let moved = false;
    for(let i = 0; i < sorted.length; i++){
      for(let j = i + 1; j < sorted.length; j++){
        const a = sorted[i], b = sorted[j];
        let d = dispA[b] - dispA[a];
        while(d >  Math.PI) d -= 2*Math.PI;
        while(d < -Math.PI) d += 2*Math.PI;
        if(Math.abs(d) < MINGAP && Math.abs(d) > 0.0001){
          const push = (MINGAP - Math.abs(d)) / 2;
          const dir  = d > 0 ? 1 : -1;
          dispA[a] -= push * dir;
          dispA[b] += push * dir;
          moved = true;
        }
      }
    }
    if(!moved) break;
  }

  // Keep glyphs away from ASC and MC ticks
  const ascAngle = Math.PI;
  const mcAngle  = e2s(data.mc, asc);
  for(let pass = 0; pass < 80; pass++){
    let moved = false;
    for(const n of present){
      for(const blocked of [ascAngle, mcAngle]){
        let d = dispA[n] - blocked;
        while(d >  Math.PI) d -= 2*Math.PI;
        while(d < -Math.PI) d += 2*Math.PI;
        if(Math.abs(d) < MINGAP && Math.abs(d) > 0.0001){
          dispA[n] = blocked + MINGAP * (d > 0 ? 1 : -1);
          moved = true;
        }
      }
    }
    // Re-spread after ASC/MC push
    if(moved){
      for(let i = 0; i < sorted.length; i++){
        for(let j = i + 1; j < sorted.length; j++){
          const a = sorted[i], b = sorted[j];
          let d = dispA[b] - dispA[a];
          while(d >  Math.PI) d -= 2*Math.PI;
          while(d < -Math.PI) d += 2*Math.PI;
          if(Math.abs(d) < MINGAP && Math.abs(d) > 0.0001){
            const push = (MINGAP - Math.abs(d)) / 2;
            const dir  = d > 0 ? 1 : -1;
            dispA[a] -= push * dir;
            dispA[b] += push * dir;
          }
        }
      }
    }
  }

  // Draw each planet
  for(const name of present){
    const info = PI[name] || {sym:'?', color:'#ffffff'};
    const tA   = trueA[name], color = info.color;

    // Check if glyph was actually moved from true position
    let diff = dispA[name] - tA;
    while(diff >  Math.PI) diff -= 2*Math.PI;
    while(diff < -Math.PI) diff += 2*Math.PI;
    const wasMoved = Math.abs(diff) > 0.015;

    // Glyph goes at display angle, or exactly at true angle if not moved
    const gxy = pxy(wasMoved ? dispA[name] : tA, Rg);

    // Short tick at true degree outside R1
    el('line',{
      x1: CX+Math.cos(tA)*(R1+1),  y1: CY+Math.sin(tA)*(R1+1),
      x2: CX+Math.cos(tA)*(R1+10), y2: CY+Math.sin(tA)*(R1+10),
      stroke: color, 'stroke-width': 1.5
    }, svg);
    el('circle',{
      cx: CX+Math.cos(tA)*(R1+1), cy: CY+Math.sin(tA)*(R1+1),
      r: 2, fill: color
    }, svg);

    // Dashed leader line only if glyph was moved
    if(wasMoved){
      el('line',{
        x1: CX+Math.cos(tA)*(R1+11), y1: CY+Math.sin(tA)*(R1+11),
        x2: gxy.x, y2: gxy.y,
        stroke: color, 'stroke-width': 0.6, opacity: 0.5, 'stroke-dasharray': '2 2'
      }, svg);
    }

    // Planet symbol
    txt(svg, info.sym, gxy.x, gxy.y, {
      fill: color, 'font-size': 22, 'font-family': 'serif'
    });

    // Retrograde marker
    if(data.planets[name].retrograde){
      txt(svg, '℞', gxy.x+14, gxy.y-12, {fill:'#f87171', 'font-size': 9});
    }
  }
  // ── ASC label — tight to left edge of circle ────────────────────────
  const ascA = e2s(asc, asc); // always = π (left side)
  el('line',{
    x1:CX+Math.cos(ascA)*(R1+1), y1:CY+Math.sin(ascA)*(R1+1),
    x2:CX+Math.cos(ascA)*(R1+16), y2:CY+Math.sin(ascA)*(R1+16),
    stroke:'#c084fc','stroke-width':2
  },svg);
  txt(svg,'ASC',
    CX+Math.cos(ascA)*(R1+30),
    CY+Math.sin(ascA)*(R1+30),
    {fill:'#c084fc','font-size':12,'font-weight':'bold','font-family':'sans-serif'});

  // ── MC — small circle outside with arrow line from main circle ─────────
  const mcA = e2s(data.mc, asc);
  // Find where MC hits the outer circle edge
  const mcEdgeX = CX + Math.cos(mcA) * R1;
  const mcEdgeY = CY + Math.sin(mcA) * R1;
  // Small circle centre — 80px outside R1
  const mcCircR = 20; // radius of small MC circle
  const mcDist  = R1 + 46;
  const mcCX = CX + Math.cos(mcA) * mcDist;
  const mcCY = CY + Math.sin(mcA) * mcDist;

  // Arrow line from R1 edge to small circle edge
  const mcLineEndX = CX + Math.cos(mcA) * (mcDist - mcCircR - 2);
  const mcLineEndY = CY + Math.sin(mcA) * (mcDist - mcCircR - 2);
  el('line',{
    x1:mcEdgeX, y1:mcEdgeY,
    x2:mcLineEndX, y2:mcLineEndY,
    stroke:'#c084fc','stroke-width':1.2,
    'marker-end':'url(#arr)'
  },svg);

  // Small circle background
  el('circle',{cx:mcCX,cy:mcCY,r:mcCircR,
    fill:'#0f0d2a',stroke:'#c084fc','stroke-width':1.2},svg);

  // MC text inside small circle
  txt(svg,'MC',mcCX,mcCY,{
    fill:'#c084fc','font-size':12,'font-weight':'bold','font-family':'sans-serif'
  });
}

function drawPlanetTable(data){
  const tbody=document.getElementById('planet-tbody');
  tbody.innerHTML='';
  const shown=new Set();
  const order=[...PORDER,...Object.keys(data.planets).filter(k=>!PORDER.includes(k))];
  for(const name of order){
    if(!data.planets[name]||shown.has(name)) continue;
    shown.add(name);
    const info=PI[name]||{sym:'★',color:'#aaaaaa'};
    const d=data.planets[name];
    const si=SIGN_KA.indexOf(d.sign);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="color:${info.color};font-size:22px;font-family:serif">${info.sym}</td>
      <td style="color:${info.color}">${name}</td>
      <td>${d.sign_degree.toFixed(2)}°</td>
      <td>${si>=0?ZSYM[si]:''} ${d.sign}</td>
      <td><span class="house-badge">${d.house||'?'}</span></td>
      <td>${d.retrograde?'<span class="retro">℞ რეტრო</span>':'პირდაპირი'}</td>`;
    tbody.appendChild(tr);
  }
}

function drawHouseTable(data){
  const tbody=document.getElementById('house-tbody');
  tbody.innerHTML='';
  const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  const ANG={0:'ASC',3:'IC',6:'DSC',9:'MC'};
  for(let i=0;i<12;i++){
    const deg=data.houses[i];
    const si=Math.floor(deg/30)%12;
    const sd=(deg%30).toFixed(2);
    const ang=ANG[i];
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="color:${ang?'#c084fc':'#9f8fd4'};font-weight:${ang?'bold':'normal'}">
        ${ROMAN[i]}${ang?' ('+ang+')':''}
      </td>
      <td>${ZSYM[si]||''} ${SIGN_KA[si]||''}</td>
      <td>${sd}°</td>`;
    tbody.appendChild(tr);
  }
}

function drawAspectTable(data){
  const tbody=document.getElementById('aspect-tbody');
  tbody.innerHTML='';
  if(!data.aspects||!data.aspects.length){
    tbody.innerHTML='<tr><td colspan="5" style="color:#555;text-align:center;padding:8px">ასპექტები არ მოიძებნა</td></tr>';
    return;
  }
  for(const asp of data.aspects){
    const i1=PI[asp.p1]||{sym:'?',color:'#aaa'};
    const i2=PI[asp.p2]||{sym:'?',color:'#aaa'};
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span style="color:${i1.color};font-size:18px;font-family:serif">${i1.sym}</span> ${asp.p1}</td>
      <td><span class="asp-sym" style="color:${asp.color}">${asp.sym}</span></td>
      <td><span style="color:${i2.color};font-size:18px;font-family:serif">${i2.sym}</span> ${asp.p2}</td>
      <td style="color:${asp.color}">${asp.type}</td>
      <td style="color:#7060b0">${asp.orb}°</td>`;
    tbody.appendChild(tr);
  }
}
</script>
